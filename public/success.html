<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — Kingdom Within</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#2D160A,#3D2314,#8B6134)">
  <div style="text-align:center;color:#fff;padding:40px;max-width:520px">
    <div style="font-size:3.5rem;margin-bottom:24px">✦</div>
    <h1 style="font-family:'Playfair Display',Georgia,serif;font-size:2.8rem;margin-bottom:16px;color:#fff">
      Welcome to the Kingdom
    </h1>
    <p style="font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:1.3rem;color:rgba(255,255,255,.82);line-height:1.7;margin-bottom:12px">
      "You have stepped through the threshold.<br>The kingdom awaits within."
    </p>
    <p style="color:rgba(255,255,255,.65);font-size:.92rem;margin-bottom:40px;line-height:1.7">
      Your membership is now active. You will receive a confirmation email shortly.
      Your card will be charged automatically each month — you can cancel at any time from your dashboard.
    </p>
    <a href="dashboard.html" id="dashBtn"
       style="display:inline-flex;align-items:center;gap:8px;padding:16px 40px;background:linear-gradient(135deg,#C9A96E,#A67C4A);color:#fff;border-radius:9999px;font-family:'Raleway',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none">
      Enter Your Dashboard →
    </a>
  </div>
  <script>
    // Stamp the membership expiry in localStorage so the dashboard knows it's active
    const session = JSON.parse(localStorage.getItem('kw_session') || 'null');
    if (session) {
      const exp = new Date();
      exp.setDate(exp.getDate() + 32);
      session.membershipExpiresAt = exp.toISOString();
      session._expired = false;
      localStorage.setItem('kw_session', JSON.stringify(session));
    }
  </script>
</body>
</html>
